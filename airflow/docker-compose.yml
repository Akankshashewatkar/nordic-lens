---
# NordicLens Airflow — LocalExecutor with Postgres metadata DB
# Usage:
#   docker compose up -d
#   docker compose exec airflow-webserver airflow users create \
#     --username admin --firstname Admin --lastname User \
#     --role Admin --email admin@nordiclens.no --password admin

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.11
  env_file: ../.env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    PYTHONPATH: /opt/airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
    - ../ingestion:/opt/airflow/ingestion       # mount source code
    - ~/.aws:/home/airflow/.aws:ro               # AWS credentials
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - nordiclens-net

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    networks:
      - nordiclens-net

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        airflow db migrate &&
        airflow connections create-default-connections
      "
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped

volumes:
  postgres-db:
  airflow-logs:
  airflow-plugins:

networks:
  nordiclens-net:
    driver: bridge
