version: 2

sources:
  - name: raw
    database: NORDICLENS_DB
    schema: RAW
    description: >
      Raw ingestion layer. Data is loaded from S3 via Snowflake COPY INTO
      by the daily Airflow ingestion DAG. Freshness is checked on every dbt run.

    freshness:
      warn_after: {count: 1, period: day}
      error_after: {count: 3, period: day}

    loaded_at_field: _loaded_at

    tables:
      - name: transactions
        description: >
          Synthetic Norwegian banking transactions generated by transaction_simulator.py.
          100,000 rows covering 2023–2024 with 5% fraud rate and injected anomaly patterns.
        columns:
          - name: transaction_id
            description: UUID primary key for each transaction.
            tests: [not_null, unique]
          - name: customer_id
            description: Foreign key to RAW.CUSTOMERS.
            tests: [not_null]
          - name: merchant_id
            description: Foreign key to RAW.MERCHANTS.
            tests: [not_null]
          - name: amount_nok
            description: Transaction amount in Norwegian Krone (NOK). Always positive.
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 0
                  strictly: true
          - name: transaction_type
            description: Type of transaction.
            tests:
              - accepted_values:
                  values: ['debit', 'credit', 'transfer']
          - name: channel
            description: Channel through which the transaction was made.
            tests:
              - accepted_values:
                  values: ['mobile', 'atm', 'online', 'branch']
          - name: is_flagged
            description: Whether the transaction was flagged as fraud by the simulator.
            tests: [not_null]

      - name: customers
        description: Synthetic Norwegian customer master data.
        columns:
          - name: customer_id
            description: UUID primary key.
            tests: [not_null, unique]
          - name: gender
            description: Customer gender (M/F/U).
            tests:
              - accepted_values:
                  values: ['M', 'F', 'U']

      - name: macro_cpi
        description: Monthly Norwegian Consumer Price Index from Statistics Norway (SSB).
        columns:
          - name: period
            description: Observation month (YYYY-MM-DD, first of month).
            tests: [not_null, unique]
          - name: cpi_index
            description: CPI index value (base year = 1998).
            tests: [not_null]

      - name: macro_rates
        description: Norges Bank key policy rate (styringsrenten), monthly.
        columns:
          - name: period
            description: Observation date.
            tests: [not_null]
          - name: value
            description: Policy rate in percent.
            tests: [not_null]
